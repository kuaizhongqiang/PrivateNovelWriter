name: Release

on:
  push:
    tags:
      - 'v*'   # v0.2.0-beta, v0.3.0, etc.

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── CLI binary (Linux) ──
  build-cli:
    name: CLI (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build -p pnw-kernel -p pnw --release
      - name: Run tests
        run: cargo test -p pnw-kernel -p pnw --release
      - name: Rename binary
        run: |
          tag="${{ github.ref_name }}"
          dst="pnw-${tag}-x86_64-unknown-linux-gnu"
          cp "target/release/pnw" "$dst"
          echo "artifact=$dst" >> $GITHUB_ENV
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pnw-linux
          path: pnw-*

  # ── npm package publish ──
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: [build-cli]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Build and publish
        run: |
          cd packages/pnw-openclaw-plugin
          npm ci
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Release ──
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-cli, publish-npm]
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pnw-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            # PNW ${{ github.ref_name }}

            ## 安装

            ### CLI (Linux)
            下载 `pnw-${{ github.ref_name }}-x86_64-unknown-linux-gnu`，赋予执行权限后使用。

            ### OpenClaw 插件
            ```bash
            npm install -g pnw-openclaw-plugin
            ```

            ## 变更
            _（待补充）_
          files: |
            pnw-*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
