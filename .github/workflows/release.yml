name: Release

on:
  push:
    tags:
      - 'v*'   # v0.2.0-beta, v0.3.0, etc.

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── CLI binary (Linux) ──
  build-cli:
    name: CLI (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build -p pnw-kernel -p pnw --release
      - name: Run tests
        run: cargo test -p pnw-kernel -p pnw --release
      - name: Rename binary
        run: |
          tag="${{ github.ref_name }}"
          dst="pnw-${tag}-x86_64-unknown-linux-gnu"
          cp "target/release/pnw" "$dst"
          echo "artifact=$dst" >> $GITHUB_ENV
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pnw-linux
          path: pnw-*

  # ── npm package publish ──
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: [build-cli]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Build and publish
        run: |
          cd packages/pnw-openclaw-plugin
          version="${GITHUB_REF_NAME#v}"
          # 仅当版本不一致时才执行 npm version，避免 npm version 报错
          current=$(node -p "require('./package.json').version")
          if [ "$current" != "$version" ]; then
            npm version "$version" --no-git-tag-version
          fi
          npm ci
          npm run build
          # 检查版本是否已存在，避免重复发布失败
          existing=$(npm view "$(node -p "require('./package.json').name")" versions --json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).includes('$version')")
          if [ "$existing" = "true" ]; then
            echo "⚠️  npm 上已有 $version，跳过发布"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Release ──
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-cli]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release body
        run: |
          cat > /tmp/release-body.md << 'EOF'
          # PNW ${{ github.ref_name }}

          ## 安装

          ### CLI (Linux)
          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pnw-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          chmod +x pnw-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          ./pnw-${{ github.ref_name }}-x86_64-unknown-linux-gnu server
          ```

          ### OpenClaw 插件
          ```bash
          npm install -g pnw-openclaw-plugin
          ```
          EOF
          # 追加 changelog
          prev_tag=$(git tag --list 'v*' --sort=-version:refname | head -2 | tail -1)
          if [ -n "$prev_tag" ]; then
            echo "" >> /tmp/release-body.md
            echo "## 变更日志（自 $prev_tag 以来）" >> /tmp/release-body.md
            echo "" >> /tmp/release-body.md
            git log "$prev_tag"..HEAD --oneline --no-decorate >> /tmp/release-body.md
          fi
          # body_path 用硬编码路径
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pnw-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/release-body.md
          files: |
            pnw-*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
